# name of workflow
name: ci

# trigger conditions for this workflow
on:
  pull_request:
    branches: [main]

# what jobs to run
jobs:
  tests:
    name: Tests # display name
    runs-on: ubuntu-latest # type of runner, default to github hosted?

    # each step has
    # name: <name of step, human readable>
    # run: shell command?
    # uses: defined action? binary?
    # with: args?
    steps:
      # https://github.com/actions/checkout
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Run tests
        run: go test ./... -cover

  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Style
        run: test -z $(go fmt ./...)
